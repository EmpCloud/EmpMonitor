<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Monochrome Pie</title>


  <link href="../../assets/styles.css" rel="stylesheet" />

  <style>
    #chart {
        max-width: 380px;
        margin: 35px auto;
    }
    </style>
</head>

<body>
  <div id="app"></div>
  
  <div id="html">
          &lt;div id=&quot;chart&quot;&gt;&#10;            &lt;ReactApexChart options={this.state.options} series={this.state.series} type=&quot;pie&quot; width=&quot;100%&quot; /&gt;&#10;          &lt;/div&gt;
  </div>

  <script src="https://unpkg.com/react@16.14.0/umd/react.production.min.js" integrity="sha384-N7y5SSAooNlIfb9H750GR82ufkn1JXJFaCjg8pmt+OZuKcZoTvTGfog4d4taG/cF" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@16.14.0/umd/react-dom.production.min.js" integrity="sha384-j7WmMv3OO6n8pZRATOsaMVEdZcHpoaTBIika/l92YM2AkEex72QunlTQlgmu+pI8" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/prop-types@15.6.2/prop-types.min.js" integrity="sha384-9Fq52URRAaPlKGhu0AzshypUBBQa7Q8Rz1ze2svcZNUHGb/PlxTygZmtyYeqEHOK" crossorigin="anonymous">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-core/5.8.34/browser.min.js" integrity="sha384-d7HbSH2Qi2lcOaXeaM18gcrHzYBpKDsFcXKGBVvoEcKmi+/BjmtUIBh6J4vgO8p0" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/apexcharts@latest" integrity="sha384-mrR3K8Jvv+o9bZ6Yu9HWI0M8tuzo5VWNi4fWcmmbFq3NbB+WvjW/tF/wnELivEnc" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-apexcharts@1.1.0/dist/react-apexcharts.iife.min.js" integrity="sha384-xqIZlTeTCwM6ERk6Jt1W0I1YcosYYF7taUsyQQOpxw0dsZSlJqkdIP+BcXqm9BfW" crossorigin="anonymous"></script>

  <script type="text/babel">

    class PieChart extends React.Component {
      
      constructor(props) {
        super(props);

        this.state = {
          options: {
            labels: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            theme: {
              monochrome: {
                enabled: true
              }
            },
            title: {
              text: "Number of leads"
            },
            responsive: [{
              breakpoint: 480,
              options: {
                chart: {
                  width: 200
                },
                legend: {
                  position: 'bottom'
                }
              }
            }]
          },
          series: [25, 15, 44, 55, 41, 17],
        }
      }

      render() {
        return (
          <div>
            <div id="chart">
              <ReactApexChart options={this.state.options} series={this.state.series} type="pie" width="100%" />
            </div>
            <div id="html-dist">
            </div>
          </div>
        );
      }
    }

    const domContainer = document.querySelector('#app');
    ReactDOM.render(React.createElement(PieChart), domContainer);

  </script>
</body>

</html>
