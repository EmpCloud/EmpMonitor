<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>TimeSeries With Irregular Data</title>

  <link href="../../assets/styles.css" rel="stylesheet" />

  <style>
    #chart {
        max-width: 650px;
        margin: 35px auto;
    }
    </style>
</head>

<body>
  <div id="app"></div>

  <div id="html">
          &lt;div id=&quot;chart&quot;&gt;&#10;            &lt;ReactApexChart options={this.state.options} series={this.state.series} type=&quot;area&quot; height=&quot;350&quot; /&gt;&#10;          &lt;/div&gt;
  </div>

  <script src="https://unpkg.com/react@16.14.0/umd/react.production.min.js" integrity="sha384-N7y5SSAooNlIfb9H750GR82ufkn1JXJFaCjg8pmt+OZuKcZoTvTGfog4d4taG/cF" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@16.14.0/umd/react-dom.production.min.js" integrity="sha384-j7WmMv3OO6n8pZRATOsaMVEdZcHpoaTBIika/l92YM2AkEex72QunlTQlgmu+pI8" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/prop-types@15.6.2/prop-types.min.js" integrity="sha384-9Fq52URRAaPlKGhu0AzshypUBBQa7Q8Rz1ze2svcZNUHGb/PlxTygZmtyYeqEHOK" crossorigin="anonymous">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.22.2/moment.min.js" integrity="sha384-sIzeKWIAHvT0Vm8QbfLCqZwBG0WMCkWVAOYd/330YSNeeQ1Y57N3T9lQz5Ry/EHH" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-core/5.8.34/browser.min.js" integrity="sha384-d7HbSH2Qi2lcOaXeaM18gcrHzYBpKDsFcXKGBVvoEcKmi+/BjmtUIBh6J4vgO8p0" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/apexcharts@latest" integrity="sha384-mrR3K8Jvv+o9bZ6Yu9HWI0M8tuzo5VWNi4fWcmmbFq3NbB+WvjW/tF/wnELivEnc" crossorigin="anonymous"></script>
  <script src="../../assets/irregular-data-series.js"></script>

  <script src="https://unpkg.com/react-apexcharts@1.1.0/dist/react-apexcharts.iife.min.js" integrity="sha384-xqIZlTeTCwM6ERk6Jt1W0I1YcosYYF7taUsyQQOpxw0dsZSlJqkdIP+BcXqm9BfW" crossorigin="anonymous"></script>

  <script type="text/babel">

    var ts1 = 1388534400000;
    var ts2 = 1388620800000;
    var ts3 = 1389052800000;

    var dataSet = [[], [], []]

    for (var i = 0; i < 12; i++) {
      ts1 = ts1 + 86400000;
      var innerArr = [ts1, dataSeries[2][i].value];
      dataSet[0].push(innerArr)
    }
    for (var i = 0; i < 18; i++) {
      ts2 = ts2 + 86400000;
      var innerArr = [ts2, dataSeries[1][i].value];
      dataSet[1].push(innerArr)
    }
    for (var i = 0; i < 12; i++) {
      ts3 = ts3 + 86400000;
      var innerArr = [ts3, dataSeries[0][i].value];
      dataSet[2].push(innerArr)
    }

    class AreaChart extends React.Component {
      
      constructor(props) {
        super(props);

        this.state = {
          options: {
            chart: {
              stacked: false,
              zoom: {
                enabled: false
              },
            },
            plotOptions: {
              line: {
                curve: 'smooth',
              }
            },
            dataLabels: {
              enabled: false
            },

            markers: {
              size: 0,
              style: 'full',
            },
            fill: {
              type: 'gradient',
              gradient: {
                shadeIntensity: 1,
                inverseColors: false,
                opacityFrom: 0.45,
                opacityTo: 0.05,
                stops: [20, 100, 100, 100]
              },
            },
            yaxis: {
              labels: {
                style: {
                  color: '#8e8da4',
                },
                offsetX: 0,
                formatter: function (val) {
                  return (val / 1000000).toFixed(2);
                },
              },
              axisBorder: {
                show: false,
              },
              axisTicks: {
                show: false
              }
            },
            xaxis: {
              type: 'datetime',
              tickAmount: 8,
              min: new Date("01/01/2014").getTime(),
              max: new Date("01/20/2014").getTime(),
              labels: {
                rotate: -15,
                rotateAlways: true,
                formatter: function (val, timestamp) {
                  return moment(new Date(timestamp)).format("DD MMM YYYY")
                }
              }
            },
            title: {
              text: 'Irregular Data in Time Series',
              align: 'left',
              offsetX: 14
            },
            tooltip: {
              shared: true
            },
            legend: {
              position: 'top',
              horizontalAlign: 'right',
              offsetX: -10
            }
          },
          series: [{
            name: 'PRODUCT A',
            data: dataSet[0]
          }, {
            name: 'PRODUCT B',
            data: dataSet[1]
          }, {
            name: 'PRODUCT C',
            data: dataSet[2]
          }],
        }
      }

      render() {
        return (
          <div>
            <div id="chart">
              <ReactApexChart options={this.state.options} series={this.state.series} type="area" height="350" />
            </div>
            <div id="html-dist">
            </div>
          </div>
        );
      }
    }

    const domContainer = document.querySelector('#app');
    ReactDOM.render(React.createElement(AreaChart), domContainer);

  </script>
</body>
</html>
